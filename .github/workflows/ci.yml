name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: make lint
      - run: make typecheck
      - run: make test
      - run: PYTHONPATH=src darwin paper-live --markets KXTEST-A,KXTEST-B --exchange-environment mock --dry-run --duration 10 --output reports/paper/ci-mock-dry
      - run: PYTHONPATH=src pytest tests/unit/test_kalshi_market_data_provider.py -q
